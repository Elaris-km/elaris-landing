  <desc id="elarisLogoDesc">Логотип Elaris с анимированным треугольным знаком.</desc>
  <style>
    .wordmark { fill: #ffffff; }
    .tri-node {
      --base-opacity: 1;
      fill: #ffffff;
      opacity: var(--base-opacity);
      animation: pulse_51 1500ms ease-in infinite;
      transform-origin: center;
    }
    .tri-node-1 { --base-opacity: 1; }
    .tri-node-2 { --base-opacity: 0.6; animation-delay: -250ms; }
    .tri-node-3 { --base-opacity: 0.2; }
    .tri-node-4 { --base-opacity: 0.8; animation-delay: -1250ms; }
    .tri-node-5 { --base-opacity: 0.4; animation-delay: -500ms; }
    .tri-node-6 { --base-opacity: 0.3; animation-delay: -500ms; }
    .tri-node-7 { --base-opacity: 0.7; animation-delay: -750ms; }
    .tri-node-8 { --base-opacity: 0.2; animation-delay: -1000ms; }
    .tri-node-9 { --base-opacity: 0.1; animation-delay: -1000ms; }
    @keyframes pulse_51 {
      0% { opacity: var(--base-opacity); }
      16.666% { opacity: var(--base-opacity); }
      100% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .tri-node { animation: none; opacity: var(--base-opacity); }
    }
  </style>
